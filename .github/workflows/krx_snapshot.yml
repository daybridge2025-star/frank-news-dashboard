name: KRX 데이터 스냅샷 수집 (하루 1회 · 미국장 마감 후)

# 하루 1회, 미국장 마감 직후로 통일(오후 회차 폐지) — 이 시점엔 "직전 영업일"인
# 한국 어제자 데이터가 마감 후 14시간+ 지나 있어 Open API(T+1)·pykrx 둘 다
# 이미 따라잡은 상태라 소스 간 날짜 불일치가 생기지 않는다.
# 06:20 KST 고정 — 미국장 마감이 서머타임에 따라 05:00(하절기)~06:00(동절기) KST로
# 움직이므로, 두 경우 모두에 여유 있게 걸리도록 늦춰 잡았다.
on:
  schedule:
    - cron: '20 21 * * *'  # UTC 21:20 = KST 06:20 (익일)
  workflow_dispatch:         # 수동 실행 가능

permissions:
  contents: write            # 결과 JSON을 저장소에 커밋·푸시하려면 쓰기 권한 필요

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: KRX 스냅샷 수집 실행
        env:
          KRX_AUTH_KEY: ${{ secrets.KRX_AUTH_KEY }}   # openapi.krx.co.kr 인증키 (지수·종목 시세)
          KRX_ID:       ${{ secrets.KRX_ID }}          # data.krx.co.kr 무료 회원 ID (투자자 수급 — pykrx)
          KRX_PW:       ${{ secrets.KRX_PW }}          # data.krx.co.kr 무료 회원 PW
        run: python fetch_krx_snapshot.py

      - name: 브리핑 HTML에 데이터 주입
        run: python build_briefing.py

      - name: 결과 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/krx_snapshot_*.json reports/macro-strategy-briefing.html
          git diff --cached --quiet || git commit -m "KRX 데이터 갱신 + 브리핑 주입 $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
