name: KRX 데이터 스냅샷 수집 (하루 2회)

on:
  schedule:
    - cron: '50 20 * * *'  # UTC 20:50 = KST 05:50 (아침 브리핑 전)
    - cron: '50 6 * * *'   # UTC 06:50 = KST 15:50 (오후 브리핑 전)
  workflow_dispatch:         # 수동 실행 가능

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: KRX 스냅샷 수집 실행
        env:
          KRX_AUTH_KEY: ${{ secrets.KRX_AUTH_KEY }}   # openapi.krx.co.kr 인증키 (지수·종목 시세)
          KRX_ID:       ${{ secrets.KRX_ID }}          # data.krx.co.kr 무료 회원 ID (투자자 수급 — pykrx)
          KRX_PW:       ${{ secrets.KRX_PW }}          # data.krx.co.kr 무료 회원 PW
        run: python fetch_krx_snapshot.py

      - name: 결과 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/krx_snapshot_*.json
          git diff --cached --quiet || git commit -m "KRX 데이터 스냅샷 갱신 $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
