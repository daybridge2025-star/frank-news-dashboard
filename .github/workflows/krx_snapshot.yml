name: KRX 데이터 스냅샷 수집 (하루 1회 · 미국장 마감 후)

# 하루 1회, 미국장 마감 직후. 기준일 판정이 pykrx 우선(2026-07-11 재설계)이라
# 한국 직전 영업일 데이터는 전날 저녁부터 확보돼 있고, 미국 지표(Yahoo/FRED)도
# 마감 직후 즉시 조회 가능 — 05:30 KST면 충분하다.
# GitHub cron은 예약보다 수십 분 늦게 도는 게 정상(+30~70분 관측)이므로,
# 지연돼도 마켓 브리프 세션 에디션(~06시대)과 자연스럽게 맞물린다.
on:
  schedule:
    - cron: '30 20 * * *'  # UTC 20:30 = KST 05:30 (익일)
  workflow_dispatch:         # 수동 실행 가능

permissions:
  contents: write            # 결과 JSON을 저장소에 커밋·푸시하려면 쓰기 권한 필요

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: KRX 스냅샷 수집 실행
        env:
          KRX_AUTH_KEY: ${{ secrets.KRX_AUTH_KEY }}   # openapi.krx.co.kr 인증키 (폴백용 시세)
          KRX_ID:       ${{ secrets.KRX_ID }}          # data.krx.co.kr 무료 회원 ID (pykrx — 주 소스)
          KRX_PW:       ${{ secrets.KRX_PW }}          # data.krx.co.kr 무료 회원 PW
        run: python fetch_krx_snapshot.py

      - name: 미국 지표 스냅샷 수집 실행
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}    # 금리·HY스프레드·연준타깃 (없으면 해당 값 미확보 유지)
        run: python fetch_us_snapshot.py

      - name: 경제 캘린더 수집 실행
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}    # 미국 지표 단계와 동일 시크릿 (Finnhub 무료플랜 403 확정으로 교체)
        run: python fetch_econ_calendar.py

      - name: 포트폴리오 보유종목 직전 종가 수집
        run: python fetch_portfolio_prices.py          # 야후 일원화(한국 .KS/.KQ 포함) — 무키·무로그인

      - name: 브리핑 HTML에 데이터 주입
        run: python build_briefing.py

      - name: 결과 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/krx_snapshot_*.json data/us_snapshot_latest.json data/econ_calendar_latest.json data/portfolio_prices_latest.json reports/macro-strategy-briefing.html
          git diff --cached --quiet || git commit -m "KRX·미국 데이터 갱신 + 브리핑 주입 $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
